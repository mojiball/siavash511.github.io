<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGHT LORD SIAVASH - SYSTEM</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  background:#000;
  font-family:Consolas,monospace;
  overflow:hidden;
  color:#00ff66;
}
#lockScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
}
#lockScreen h1{
  color:#00ff66;
  font-size:42px;
  letter-spacing:10px;
  text-shadow:0 0 35px #00ff66, 0 0 70px #00ff66;
  font-family: 'Impact', sans-serif;
}
#lockScreen input{
  padding:15px 25px;
  background:#000;
  border:2px solid #00ff66;
  color:#00ff66;
  font-size:18px;
  outline:none;
  width:300px;
  text-align:center;
  font-family:Consolas,monospace;
}
#lockScreen button{
  padding:12px 30px;
  background:#000;
  color:#00ff66;
  border:2px solid #00ff66;
  cursor:pointer;
  font-size:16px;
  font-family:Consolas,monospace;
}
#lockScreen button:hover{
  box-shadow:0 0 25px #00ff66;
  background:#001100;
}
#errorMsg{
  color:#ff0000;
  font-size:14px;
  height:20px;
  text-shadow:0 0 10px #ff0000;
}
.hidden{
  display:none!important;
}
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#001100,#000);
  z-index:-5;
}

.bgtext{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-8deg);
  font-size:100px;
  font-weight:900;
  letter-spacing:15px;
  color:rgba(0,255,102,0.2);
  font-family: 'Impact', 'Arial Black', sans-serif;
  text-transform:uppercase;
  text-shadow:
    0 0 45px rgba(0,255,102,0.9),
    0 0 90px rgba(0,255,102,0.6),
    0 0 130px rgba(0,255,102,0.4);
  pointer-events:none;
  z-index:-4;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{
 0%, 100%{ opacity:0.2; transform:translate(-50%,-50%) rotate(-8deg) scale(1); }
 50%{ opacity:0.4; transform:translate(-50%,-50%) rotate(-8deg) scale(1.1); }
}

#terminal{
  position:absolute;
  top:10px;
  left:10px;
  width:48%;
  height:82vh;
  padding:10px;
  overflow:auto;
  border:1px solid #00ff66;
  background:rgba(0,0,0,.65);
  box-shadow:0 0 25px #00ff66;
}
.line{
  margin:4px 0;
  font-size:13px;
}
.error{
  color:#ff0000;
  text-shadow:0 0 10px #ff0000;
}
.warning{
  color:#ffaa00;
  text-shadow:0 0 10px #ffaa00;
}
.success{
  color:#00ffff;
  text-shadow:0 0 10px #00ffff;
}
#inputBox{
  position:fixed;
  bottom:10px;
  left:10px;
  width:48%;
  display:flex;
  gap:10px;
}
#cmd{
  flex:1;
  padding:12px;
  background:#000;
  border:1px solid #00ff66;
  color:#00ff66;
  outline:none;
  font-size:15px;
}
button{
  padding:12px 20px;
  background:#000;
  color:#00ff66;
  border:1px solid #00ff66;
  cursor:pointer;
}
button:hover{
  box-shadow:0 0 15px #00ff66;
}
button:disabled{
  opacity:0.3;
  cursor:not-allowed;
}
#cmd:disabled{
  opacity:0.3;
  border-color:#ff0000;
}

#fullscreenBtn{
  position:fixed;
  bottom:55px;
  left:10px;
  padding:8px 15px;
  background:#000;
  color:#00ff66;
  border:1px solid #00ff66;
  cursor:pointer;
  font-size:12px;
  font-family:Consolas,monospace;
  letter-spacing:2px;
}
#fullscreenBtn:hover{
  box-shadow:0 0 20px #00ff66;
  background:#001100;
}

.box{
  position:fixed;
  right:1%;
  width:48%;
  height:24vh;
  display:none;
  border:2px solid;
  background:rgba(0,0,0,.95);
  padding:8px;
  overflow:hidden;
  font-size:11px;
  z-index:10;
}
#codeBox{
  top:10px;
  border-color:#00ff66;
  box-shadow:0 0 35px #00ff66;
  color:#00ff66;
}
#chineseBox{
  top:26vh;
  border-color:#00ffff;
  box-shadow:0 0 35px #00ffff;
  color:#00ffff;
}
#hackerBox{
  top:52vh;
  border-color:#ff0066;
  box-shadow:0 0 35px #ff0066;
  color:#ff0066;
}
#earthBox{
  position:fixed;
  right:1%;
  top:78vh;
  width:48%;
  height:20vh;
  border:2px solid #ffaa00;
  box-shadow:0 0 35px #ffaa00;
  color:#ffaa00;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bgtext">NIGHT LORD SIAVASH</div>

<div id="lockScreen">
  <h1>NIGHT LORD SIAVASH</h1>
  <input type="password" id="passInput" placeholder="Enter password">
  <button onclick="checkPass()">ACCESS</button>
  <div id="errorMsg"></div>
</div>

<div id="main" class="hidden">
  <div id="terminal"></div>
  <div id="inputBox">
    <input type="text" id="cmd" placeholder="Enter command...">
    <button onclick="runCmd()">EXECUTE</button>
  </div>
  <button id="fullscreenBtn" onclick="toggleFull()">FULL SCREEN</button>
  
  <div id="codeBox" class="box">SYSTEM ACCESS GRANTED<br>Welcome NIGHT LORD SIAVASH</div>
  <div id="chineseBox" class="box">System Activated<br>NIGHT LORD SIAVASH ONLINE</div>
  <div id="hackerBox" class="box">HACKING PROTOCOL INITIATED<br>Target: Acquired</div>
  <div id="earthBox" class="box">LOCATION: JALABAD<br>STATUS: SECURED</div>
</div>

<script>
function checkPass(){
  let pass = document.getElementById('passInput').value;
  if(pass === 'siavash'){
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    startTerminal();
  } else {
    document.getElementById('errorMsg').innerText = 'ACCESS DENIED!';
  }
}
function startTerminal(){
  let term = document.getElementById('terminal');
  term.innerHTML = '<div class="line success">> NIGHT LORD SIAVASH SYSTEM BOOTED</div><div class="line">> Access Level: ADMIN</div><div class="line warning">> All systems operational</div>';
}
function runCmd(){
  let cmd = document.getElementById('cmd').value;
  let term = document.getElementById('terminal');
  term.innerHTML += '<div class="line">> ' + cmd + '</div><div class="line success">Command executed successfully</div>';
  document.getElementById('cmd').value = '';
  term.scrollTop = term.scrollHeight;
}
function toggleFull(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
document.getElementById('codeBox').style.display = 'block';
document.getElementById('chineseBox').style.display = 'block';
document.getElementById('hackerBox').style.display = 'block';
document.getElementById('earthBox').style.display = 'block';
</script>
</body>
</html>
